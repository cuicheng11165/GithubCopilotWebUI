name: copilot-web-ui

x-app-env: &app-env
  NODE_ENV: production
  DATABASE_MODE: multi-user
  PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3000}
  DATABASE_URL: postgresql://copilot:${POSTGRES_PASSWORD:-copilot}@postgres:5432/copilot
  REDIS_URL: redis://redis:6379
  COOKIE_SECRET: ${COOKIE_SECRET}
  TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
  REPOSITORIES_CONFIG: /config/repositories.yaml
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
  GITHUB_ALLOWED_ORGS: ${GITHUB_ALLOWED_ORGS}
  GITHUB_ALLOWED_ENTERPRISES: ${GITHUB_ALLOWED_ENTERPRISES:-}
  GHE_HOST: ${GHE_HOST:-}
  GHE_CLIENT_ID: ${GHE_CLIENT_ID:-}
  GHE_CLIENT_SECRET: ${GHE_CLIENT_SECRET:-}
  GHE_ALLOWED_ORGS: ${GHE_ALLOWED_ORGS:-}
  GHE_ALLOWED_ENTERPRISES: ${GHE_ALLOWED_ENTERPRISES:-}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: copilot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-copilot}
      POSTGRES_DB: copilot
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: [CMD-SHELL, pg_isready -U copilot]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: [redis-server, --appendonly, "yes"]
    volumes: [redis-data:/data]
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    build: { context: ., target: api }
    environment:
      DATABASE_MODE: multi-user
      DATABASE_URL: postgresql://copilot:${POSTGRES_PASSWORD:-copilot}@postgres:5432/copilot
    command: [node, packages/db/node_modules/prisma/build/index.js, migrate, deploy, --schema, packages/db/prisma/schema.prisma]
    depends_on:
      postgres: { condition: service_healthy }
    restart: "no"

  sandbox-image:
    image: copilot-web-sandbox:local
    build: { context: ., dockerfile: Dockerfile.sandbox }
    command: ["true"]
    restart: "no"

  egress-proxy:
    image: ubuntu/squid:6.10-24.10_edge
    volumes: [./config/squid.conf:/etc/squid/squid.conf:ro]
    networks: [sandbox-internal, egress-public]
    restart: unless-stopped

  sandbox-runner:
    build: { context: ., target: sandbox-runner }
    environment:
      SANDBOX_RUNNER_PORT: 4100
      SANDBOX_RUNNER_TOKEN: ${SANDBOX_RUNNER_TOKEN}
      REPOSITORIES_CONFIG: /config/repositories.yaml
      CONTAINER_RUNTIME: docker
      DOCKER_HOST: unix:///var/run/docker.sock
      SANDBOX_DEFAULT_IMAGE: copilot-web-sandbox:local
      SANDBOX_ALLOWED_IMAGES: ${SANDBOX_ALLOWED_IMAGES:-copilot-web-sandbox:local}
      SANDBOX_NETWORK: copilot-sandbox-internal
      SANDBOX_HTTP_PROXY: http://egress-proxy:3128
      COMMAND_TIMEOUT_SECONDS: ${COMMAND_TIMEOUT_SECONDS:-120}
      COMMAND_MAX_OUTPUT_BYTES: ${COMMAND_MAX_OUTPUT_BYTES:-1048576}
    volumes:
      - ${REPOSITORIES_CONFIG_FILE:-./config/repositories.example.yaml}:/config/repositories.yaml:ro
      - ${REPO_ROOT}:${REPO_ROOT}:ro
      - ${CONTAINER_RUNTIME_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    networks: [app, sandbox-internal]
    depends_on:
      sandbox-image: { condition: service_completed_successfully }
      egress-proxy: { condition: service_started }
    healthcheck:
      test: [CMD, node, -e, "fetch('http://localhost:4100/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  api:
    build: { context: ., target: api }
    environment:
      <<: *app-env
      API_PORT: 4000
    volumes:
      - ${REPOSITORIES_CONFIG_FILE:-./config/repositories.example.yaml}:/config/repositories.yaml:ro
      - ${REPO_ROOT}:${REPO_ROOT}:ro
    ports: ["4000:4000"]
    networks: [app]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
    healthcheck:
      test: [CMD, node, -e, "fetch('http://localhost:4000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  worker:
    build: { context: ., target: worker }
    environment:
      NODE_ENV: production
      DATABASE_MODE: multi-user
      DATABASE_URL: postgresql://copilot:${POSTGRES_PASSWORD:-copilot}@postgres:5432/copilot
      REDIS_URL: redis://redis:6379
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      REPOSITORIES_CONFIG: /config/repositories.yaml
      SANDBOX_RUNNER_URL: http://sandbox-runner:4100
      SANDBOX_RUNNER_TOKEN: ${SANDBOX_RUNNER_TOKEN}
      COPILOT_HOME: /var/lib/copilot
      WORKER_CONCURRENCY: ${MULTI_USER_WORKER_CONCURRENCY:-8}
      APPROVAL_TIMEOUT_SECONDS: ${APPROVAL_TIMEOUT_SECONDS:-300}
    volumes:
      - ${REPOSITORIES_CONFIG_FILE:-./config/repositories.example.yaml}:/config/repositories.yaml:ro
      - ${REPO_ROOT}:${REPO_ROOT}:ro
      - copilot-state:/var/lib/copilot
    networks: [app]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      sandbox-runner: { condition: service_healthy }
    restart: unless-stopped

  web:
    build: { context: ., target: web }
    environment:
      API_INTERNAL_URL: http://api:4000
    ports: ["3000:3000"]
    networks: [app]
    depends_on:
      api: { condition: service_healthy }
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  copilot-state:

networks:
  app:
  sandbox-internal:
    name: copilot-sandbox-internal
    internal: true
  egress-public:
